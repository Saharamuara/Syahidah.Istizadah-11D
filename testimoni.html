<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Testimoni-Toko Buku Ranaruta Baswara</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="header-beranda">
        <img src="Image/header.png" alt="Banner Toko Ranaruta Baswara">
    </div>
 <header>
    <h1>Selamat Datang di Toko Buku Ranaruta Baswara</h1>
    <nav>
    <a href="index.html">BERANDA</a>
    <a href="produk.html">PRODUK</a>
    <a href="bedah-buku.html">BEDAH</a>
    <a href="testimoni.html">TESTIMONI</a>
    <a href="tampil-testimoni.html">TESTIMONI PEMBELI</a>
    </nav>
</header>

<main class="Formulir">
    <h2>Berikan Testimoni Anda</h2>
    <form id="formTestimoni">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required placeholder="Nama lengkap">
        <label for="asal sekolah/instansi/komunitas">Asal sekolah/Instansi/Komunitas:</label>
        <input type="text" id="asal sekolah/instansi/komunitas" name="asal sekolah/instansi/komunitas" required placeholder="Asal sekolah/Instansi/Komunitas">
        <label for="judul buku yang dibeli">Judul buku yang dibeli</label>
        <input type="text" id="judul buku yang dibeli" name="judul buku yang dibeli" required placeholder="Judul buku yang dibeli">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="email@example.com">
        <label for="rating">Rating:</label>
        <input type="number" id="rating" name="rating" required placeholder="Rating">
        <label for="pesan">Testimoni Anda:</label>
        <textarea id="pesan" name="pesan" required placeholder="Tulis pengalaman Anda..." rows="5"></textarea>

        <button type="submit">Kirim Testimoni</button>
    </form>
</main>
<footer>
    <p>&copy; 2026 Toko Buku Ranaruta Baswara</p>
</footer>
<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const email = document.getElementById('email').value;
        const asal = document.getElementById('asal').value;
        const judul = document.getElementById('judul').value;
        const pesan = document.getElementById('pesan').value;
        const dataBaru = { nama, email, asal, judul, pesan };

        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

        testimoniList.push(dataBaru);

        localStorage.setItem('testimoniList',JSON.stringify(testimoniList));
        window.location.href = 'proses-testimoni.html';
    });
</script>
